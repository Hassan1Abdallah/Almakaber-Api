name: CI/CD Pipeline to MonsterASP

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: 🧪 Run Unit Tests
      run: dotnet test Almakaber.Tests/Almakaber.Tests.csproj --configuration Release

    - name: 🏗️ Build and Publish
      run: dotnet publish Almakaber.API/Almakaber.API.csproj -c Release -o ./publish_output

    - name: 🚀 Deploy to MonsterASP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_output/
        server-dir: /wwwroot/
